<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イメージみっけ</title>
    
    <!-- React & Babel (ブラウザ上でReactを動かすためのシステム) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS (デザインを整えるためのシステム) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts (綺麗な日本語フォント) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <!-- アプリ独自のCSS (クレイモーフィズム) -->
    <style>
        body, .mikke-app, .mikke-app * { font-family: 'Noto Sans JP', sans-serif !important; }
        .clay-panel { background: #e8ecf2; border-radius: 24px; box-shadow: 8px 8px 16px #cdd3de, -8px -8px 16px #ffffff, inset 2px 2px 4px rgba(255,255,255,0.8), inset -2px -2px 4px rgba(0,0,0,0.02); }
        @media (min-width: 768px) {
          .clay-panel { border-radius: 32px; box-shadow: 12px 12px 24px #cdd3de, -12px -12px 24px #ffffff, inset 2px 2px 4px rgba(255,255,255,0.8), inset -2px -2px 4px rgba(0,0,0,0.02); }
        }
        .clay-input { background: #e8ecf2; border-radius: 16px; border: 2px solid transparent; box-shadow: inset 6px 6px 12px #cdd3de, inset -6px -6px 12px #ffffff; transition: all 0.2s ease; outline: none; }
        .clay-input:focus { border: 2px solid #a78bfa; box-shadow: inset 8px 8px 16px #cdd3de, inset -8px -8px 16px #ffffff; }
        .clay-btn { background: linear-gradient(135deg, #a78bfa, #818cf8); border-radius: 20px; box-shadow: 6px 6px 12px #cdd3de, -6px -6px 12px #ffffff, inset 4px 4px 8px rgba(255,255,255,0.4), inset -4px -4px 8px rgba(0,0,0,0.1); transition: all 0.15s ease; cursor: pointer; }
        .clay-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 8px 8px 16px #cdd3de, -8px -8px 16px #ffffff, inset 4px 4px 8px rgba(255,255,255,0.4), inset -4px -4px 8px rgba(0,0,0,0.1); }
        .clay-btn:active:not(:disabled), .clay-btn:disabled { transform: translateY(2px); box-shadow: inset 6px 6px 12px rgba(0,0,0,0.15), inset -6px -6px 12px rgba(255,255,255,0.3); }
        .clay-btn-secondary { background: #e8ecf2; border-radius: 12px; box-shadow: 4px 4px 8px #cdd3de, -4px -4px 8px #ffffff; cursor: pointer; }
        .clay-btn-secondary:active { box-shadow: inset 4px 4px 8px #cdd3de, inset -4px -4px 8px #ffffff; }
        .clay-image-box { background: #e8ecf2; border-radius: 24px; box-shadow: inset 8px 8px 16px #cdd3de, inset -8px -8px 16px #ffffff; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#e8ecf2]">
    <!-- アプリが表示される場所 -->
    <div id="root"></div>

    <!-- ここからアプリ本体のコード -->
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // アイコンコンポーネント (lucide-reactの代わり)
        const Copy = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>;
        const Check = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        const ImageIcon = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const Loader2 = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const AlertCircle = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const Download = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const Sparkles = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const UploadCloud = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>;
        const X = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const FileText = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>;
        const Lock = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const Key = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>;
        const ChevronRight = (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;

        // === 設定と定数 ===
        const WORKER_URL = "https://image-mikke.yymmatsu.workers.dev"; 
        const MAX_FREE_USAGE = 3;
        const STRIPE_PAYMENT_URL = "https://buy.stripe.com/28EbJ0fTc83b7WT5sMcV20C"; 

        const PROMPT_MAPPINGS = {
          style: {
            "写真風": "photorealistic, professional photography",
            "アニメ風": "anime style, vibrant colors",
            "油絵風": "oil painting, canvas texture",
            "水彩画風": "watercolor, soft edges",
            "デジタルアート": "digital art, highly detailed"
          },
          quality: {
            "標準": "good quality",
            "高品質": "high quality, detailed",
            "最高品質": "masterpiece, best quality, ultra-detailed, 8K"
          },
          lighting: {
            "自然光": "natural lighting",
            "スタジオライト": "studio lighting, professional",
            "ドラマチック": "dramatic lighting, high contrast",
            "柔らかい光": "soft lighting, diffused",
            "逆光": "backlit, rim lighting"
          },
          composition: {
            "クローズアップ": "close-up shot",
            "全体像": "full body shot, wide angle",
            "鳥瞰図": "aerial view, top-down",
            "低いアングル": "low angle shot",
            "指定なし (元画像に合わせる)": ""
          }
        };

        const ASPECT_RATIO_MAPPINGS = {
          "SNS投稿 (3:4)": "3:4",
          "SNSリール (9:16)": "9:16",
          "横長コンテンツ (16:9)": "16:9",
          "正方形 (1:1)": "1:1"
        };

        const fetchWithRetry = async (url, options, maxRetries = 5) => {
          let delay = 1000;
          for (let i = 0; i < maxRetries; i++) {
            try {
              const response = await fetch(url, options);
              if (!response.ok) {
                let errorMessage = `HTTP error! status: ${response.status}`;
                try {
                  const errorData = await response.json();
                  errorMessage = errorData.error?.message || errorMessage;
                } catch (e) {}
                
                if (response.status === 400 || response.status === 401 || response.status === 403) {
                  throw new Error(`エラー(${response.status}): ${errorMessage}`);
                }
                throw new Error(errorMessage);
              }
              return response;
            } catch (error) {
              if (error.message.includes('エラー(4') || i === maxRetries - 1) {
                throw new Error(`通信に失敗しました詳細: ${error.message}`);
              }
              await new Promise(res => setTimeout(res, delay));
              delay *= 2;
            }
          }
        };

        function App() {
          const [content, setContent] = useState('夕暮れの海辺で本を読む猫');
          const [style, setStyle] = useState('写真風');
          const [quality, setQuality] = useState('最高品質');
          const [lighting, setLighting] = useState('自然光');
          const [composition, setComposition] = useState('全体像');
          const [size, setSize] = useState('正方形 (1:1)');

          const [isGenerating, setIsGenerating] = useState(false);
          const [generatedImage, setGeneratedImage] = useState(null);
          const [finalPrompt, setFinalPrompt] = useState(null);
          const [error, setError] = useState(null);
          const [copySuccess, setCopySuccess] = useState(false);

          const [referenceImage, setReferenceImage] = useState(null);
          const [isDragging, setIsDragging] = useState(false);
          const [isFileProcessing, setIsFileProcessing] = useState(false);
          const fileInputRef = useRef(null);

          const [usageCount, setUsageCount] = useState(0);
          const [isUnlocked, setIsUnlocked] = useState(false);
          const [showPasswordInput, setShowPasswordInput] = useState(false);
          const [passwordInput, setPasswordInput] = useState('');
          const [passwordError, setPasswordError] = useState('');
          const [isUnlocking, setIsUnlocking] = useState(false); 

          useEffect(() => {
            if (typeof window !== 'undefined') {
              const savedCount = localStorage.getItem('mikke_usage_count');
              const savedUnlock = localStorage.getItem('mikke_is_unlocked');
              if (savedCount) setUsageCount(parseInt(savedCount, 10));
              if (savedUnlock === 'true') setIsUnlocked(true);
            }
          }, []);

          const incrementUsage = () => {
            if (!isUnlocked) {
              const newCount = usageCount + 1;
              setUsageCount(newCount);
              localStorage.setItem('mikke_usage_count', newCount.toString());
            }
          };

          const handleUnlock = async () => {
            if (!passwordInput.trim()) return;
            
            setIsUnlocking(true);
            setPasswordError('');
            
            try {
              const response = await fetch(`${WORKER_URL}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: passwordInput })
              });
              
              const data = await response.json();
              
              if (response.ok && data.success) {
                setIsUnlocked(true);
                localStorage.setItem('mikke_is_unlocked', 'true');
                setShowPasswordInput(false);
                setPasswordError('');
                setUsageCount(0);
                localStorage.setItem('mikke_usage_count', '0');
              } else {
                setPasswordError(data.error || 'パスワードが間違っています。');
              }
            } catch (err) {
              setPasswordError('サーバーとの通信に失敗しました。');
            } finally {
              setIsUnlocking(false);
            }
          };

          const isLimitReached = !isUnlocked && usageCount >= MAX_FREE_USAGE;

          const processFile = (file) => {
            if (isLimitReached) return;
            
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
            if (!validTypes.includes(file.type)) {
              setError("JPG, PNG, または PDFファイルをアップロードしてください。");
              return;
            }

            const reader = new FileReader();
            reader.onloadend = async () => {
              const base64String = reader.result.split(',')[1];
              
              if (file.type === 'application/pdf') {
                setIsFileProcessing(true);
                setError(null);
                try {
                  const pdfInstruction = "このPDFドキュメントの内容を詳細に読み取り、画像生成AIに入力するための「日本語の情景説明」や「被写体の説明」を作成してください。出力は作成した説明文のみ（100文字〜200文字程度）としてください。";
                  
                  const textResponse = await fetchWithRetry(
                    `${WORKER_URL}/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`,
                    {
                      method: 'POST',
                      headers: { 'Content-Type': 'application/json' },
                      body: JSON.stringify({
                        contents: [{
                          parts: [
                            { text: pdfInstruction },
                            { inlineData: { mimeType: 'application/pdf', data: base64String } }
                          ]
                        }]
                      })
                    }
                  );
                  const textData = await textResponse.json();
                  const extractedText = textData.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
                  if (extractedText) setContent(extractedText);
                  else throw new Error("PDFからテキストを抽出できませんでした。");
                } catch (err) {
                  setError(err.message || "PDFの読み取り中にエラーが発生しました。");
                } finally {
                  setIsFileProcessing(false);
                }
              } else {
                setReferenceImage({
                  base64: base64String,
                  mimeType: file.type,
                  dataUrl: reader.result
                });
                setComposition('指定なし (元画像に合わせる)');
              }
            };
            reader.readAsDataURL(file);
          };

          const handleDrop = (e) => {
            e.preventDefault();
            setIsDragging(false);
            if (isLimitReached) return;
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
          };

          const handleFileSelect = (e) => {
            if (isLimitReached) return;
            const file = e.target.files[0];
            if (file) processFile(file);
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          const handleGenerate = async () => {
            if (isLimitReached) return;
            
            if (!content.trim()) {
              setError("画像の内容を入力してください。");
              return;
            }

            setIsGenerating(true);
            setError(null);
            setGeneratedImage(null);
            setFinalPrompt(null);
            setCopySuccess(false);

            try {
              const translationInstruction = `Translate the following Japanese text to English. Output ONLY the English translation, without any quotes or explanations. Japanese: ${content}`;
              const textResponse = await fetchWithRetry(
                `${WORKER_URL}/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ contents: [{ parts: [{ text: translationInstruction }] }] })
                }
              );
              const textData = await textResponse.json();
              let translatedContent = textData.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
              translatedContent = translatedContent.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
              if (!translatedContent) throw new Error("翻訳に失敗しました。");

              let englishPrompt = [
                translatedContent,
                PROMPT_MAPPINGS.style[style],
                PROMPT_MAPPINGS.quality[quality],
                PROMPT_MAPPINGS.lighting[lighting],
                PROMPT_MAPPINGS.composition[composition]
              ].filter(Boolean).join(", ");
              
              if (referenceImage) {
                englishPrompt = `Modify the attached image strictly according to this description: ${englishPrompt}`;
              }
              setFinalPrompt(englishPrompt);

              const finalImagePrompt = `${englishPrompt}. Aspect ratio: ${ASPECT_RATIO_MAPPINGS[size]}.`;
              const payloadParts = [{ text: finalImagePrompt }];
              if (referenceImage) {
                payloadParts.push({ inlineData: { mimeType: referenceImage.mimeType, data: referenceImage.base64 } });
              }

              const imageResponse = await fetchWithRetry(
                `${WORKER_URL}/v1beta/models/gemini-2.5-flash-image-preview:generateContent`,
                {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: payloadParts }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                  })
                }
              );

              const imageData = await imageResponse.json();
              if (imageData.candidates?.[0]?.finishReason && imageData.candidates[0].finishReason !== 'STOP') {
                throw new Error(`画像生成がブロックされました (理由: ${imageData.candidates[0].finishReason})。別の内容をお試しください。`);
              }

              const base64Image = imageData.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
              if (base64Image) {
                setGeneratedImage(`data:image/png;base64,${base64Image}`);
                incrementUsage(); 
              } else {
                throw new Error("画像データが取得できませんでした。");
              }
            } catch (err) {
              setError(err.message || "エラーが発生しました。");
            } finally {
              setIsGenerating(false);
            }
          };

          const handleCopyPrompt = () => {
            if (!finalPrompt) return;
            const textArea = document.createElement("textarea");
            textArea.value = finalPrompt;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setCopySuccess(true);
              setTimeout(() => setCopySuccess(false), 2000);
            } catch (err) {}
            document.body.removeChild(textArea);
          };

          const handleDownload = () => {
            if (!generatedImage) return;
            const link = document.createElement('a');
            link.href = generatedImage;
            link.download = `mikke-image-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          const Label = ({ children }) => (
            <label className="block text-sm font-bold text-slate-500 mb-2 ml-1">
              {children}
            </label>
          );

          const Select = ({ value, onChange, options, disabled }) => (
            <div className="relative">
              <select
                value={value}
                onChange={onChange}
                disabled={disabled}
                className={`clay-input w-full appearance-none font-medium py-3 px-4 text-sm ${disabled ? 'text-slate-400 bg-slate-100 cursor-not-allowed' : 'text-slate-700 cursor-pointer'}`}
              >
                {options.map((opt) => (
                  <option key={opt} value={opt}>{opt}</option>
                ))}
              </select>
              <div className={`pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 ${disabled ? 'text-slate-300' : 'text-slate-400'}`}>
                <ChevronRight className="fill-current h-5 w-5" />
              </div>
            </div>
          );

          const renderBanner = () => {
            if (isUnlocked) return null; 

            if (usageCount >= MAX_FREE_USAGE) {
              return (
                <div className="bg-rose-500 text-white p-3 rounded-2xl shadow-md mb-6 flex flex-col md:flex-row items-center justify-between gap-4 animate-in fade-in slide-in-from-top-4 border-2 border-rose-600/50">
                  <div className="flex items-center gap-2 font-bold shrink-0">
                    <AlertCircle className="w-5 h-5 text-rose-200" />
                    <span>⚠️ 無料体験が終了しました</span>
                  </div>
                  <div className="flex items-center gap-3 w-full md:w-auto">
                    <a 
                      href={STRIPE_PAYMENT_URL} 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="bg-white text-rose-600 px-4 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-rose-50 transition-colors flex items-center gap-1 flex-1 justify-center whitespace-nowrap"
                    >
                      ご購入はこちら <ChevronRight className="w-4 h-4" />
                    </a>
                    <button 
                      onClick={() => setShowPasswordInput(!showPasswordInput)}
                      className="text-rose-100 hover:text-white text-xs underline font-medium whitespace-nowrap shrink-0"
                    >
                      購入済みの方
                    </button>
                  </div>
                </div>
              );
            }

            const remaining = MAX_FREE_USAGE - usageCount;
            let bannerText = "🎁 今なら3回まで無料でお試しいただけます（登録不要）";
            if (usageCount > 0) {
              bannerText = `🎁 無料体験 残り${remaining}回（全3回）`;
            }

            return (
              <div className="bg-gradient-to-r from-amber-200 to-yellow-400 p-3 rounded-2xl shadow-sm mb-6 flex items-center justify-center border-2 border-yellow-100">
                <span className="font-bold text-yellow-900 text-xs sm:text-sm md:text-base drop-shadow-sm flex items-center gap-2 text-center">
                  <Sparkles className="w-4 h-4 sm:w-5 sm:h-5 text-yellow-600 shrink-0" />
                  {bannerText}
                </span>
              </div>
            );
          };

          return (
            <div className="mikke-app p-3 sm:p-4 md:p-8 flex flex-col font-medium min-h-screen">
              <header className="mb-4 text-center pt-2 sm:pt-4">
                <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-500 to-indigo-500 inline-flex items-center gap-2 md:gap-3 drop-shadow-sm">
                  <Sparkles className="w-6 h-6 sm:w-8 sm:h-8 text-violet-500" />
                  イメージみっけ
                </h1>
                <p className="text-slate-500 mt-2 font-bold text-xs sm:text-sm tracking-wide">
                  プロンプト不要で、とっておきの1枚を作ろう
                </p>
              </header>

              <div className="max-w-7xl w-full mx-auto">
                {renderBanner()}

                {showPasswordInput && !isUnlocked && (
                  <div className="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row items-center gap-3 border border-slate-200 animate-in fade-in zoom-in-95">
                    <Lock className="w-5 h-5 text-slate-400 shrink-0" />
                    <input 
                      type="text" 
                      placeholder="サンクスメールに記載されたパスワードを入力"
                      value={passwordInput}
                      onChange={(e) => setPasswordInput(e.target.value)}
                      className="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 outline-none focus:border-violet-400 text-sm w-full"
                    />
                    <button 
                      onClick={handleUnlock}
                      disabled={isUnlocking}
                      className="bg-slate-800 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-slate-700 transition-colors w-full md:w-auto whitespace-nowrap disabled:opacity-70 flex items-center justify-center gap-2"
                    >
                      {isUnlocking ? <Loader2 className="w-4 h-4 animate-spin shrink-0" /> : null}
                      {isUnlocking ? '確認中...' : '解除する'}
                    </button>
                    {passwordError && <span className="text-rose-500 text-xs font-bold w-full md:w-auto">{passwordError}</span>}
                  </div>
                )}

                <main className="flex flex-col lg:flex-row gap-6 lg:gap-8 flex-1">
                  <aside className="clay-panel w-full lg:w-[400px] flex-shrink-0 p-5 md:p-8 flex flex-col gap-5 md:gap-6 relative">
                    
                    {isLimitReached && (
                      <div className="absolute inset-0 bg-slate-50/50 backdrop-blur-[2px] z-10 rounded-[24px] md:rounded-[32px] flex flex-col items-center justify-center p-6 text-center">
                        <div className="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 flex flex-col items-center gap-4 w-full">
                          <Key className="w-12 h-12 text-slate-300 mb-2" />
                          <h3 className="text-lg sm:text-xl font-bold text-slate-700">制限に達しました</h3>
                          <p className="text-xs sm:text-sm text-slate-500 font-medium leading-relaxed">
                            無料体験は終了しました。<br/>引き続きご利用いただくにはご購入が必要です。
                          </p>
                          <a 
                            href={STRIPE_PAYMENT_URL} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="clay-btn w-full py-3 mt-2 font-bold text-white text-center flex items-center justify-center gap-2 text-sm sm:text-base"
                          >
                            ご購入ページへ
                          </a>
                        </div>
                      </div>
                    )}

                    <div>
                      <div className="flex justify-between items-end mb-2 ml-1">
                        <label className="block text-sm font-bold text-slate-500">
                          なにを描きたい？ (画像の内容)
                        </label>
                      </div>
                      
                      <div 
                        className={`clay-input flex flex-col transition-all overflow-hidden ${isDragging ? 'border-violet-400 bg-violet-50/50 scale-[1.02]' : ''} ${isLimitReached ? 'opacity-50' : ''}`}
                        onDragOver={(e) => { e.preventDefault(); if(!isLimitReached) setIsDragging(true); }}
                        onDragLeave={() => setIsDragging(false)}
                        onDrop={handleDrop}
                      >
                        <textarea
                          value={content}
                          onChange={(e) => setContent(e.target.value)}
                          disabled={isLimitReached}
                          className="w-full bg-transparent text-slate-700 py-3 px-4 text-sm resize-none h-24 outline-none placeholder:text-slate-400 disabled:cursor-not-allowed"
                          placeholder="生成したい画像の説明を入力..."
                        />
                        
                        <div className="flex flex-wrap justify-between items-center px-3 pb-3 pt-1 gap-2">
                          {isFileProcessing ? (
                            <span className="text-[10px] sm:text-xs text-violet-500 font-bold flex items-center gap-1 animate-pulse">
                              <Loader2 className="w-3.5 h-3.5 sm:w-4 sm:h-4 animate-spin shrink-0" />
                              PDFを読み取り中...
                            </span>
                          ) : (
                            <span className="text-[10px] sm:text-xs text-slate-400 font-bold flex items-center gap-1.5 pointer-events-none">
                              <UploadCloud className="w-3.5 h-3.5 sm:w-4 sm:h-4 shrink-0" />
                              <span className="truncate max-w-[120px] sm:max-w-none">JPG/PDFをドロップ</span>
                            </span>
                          )}
                          
                          <button 
                            onClick={() => fileInputRef.current?.click()} 
                            disabled={isLimitReached}
                            className="text-xs bg-white/60 hover:bg-white text-slate-600 px-3 py-1.5 rounded-lg shadow-sm font-bold flex items-center gap-1 transition-all border border-slate-200 disabled:opacity-50 disabled:cursor-not-allowed shrink-0 ml-auto"
                          >
                            <FileText className="w-3.5 h-3.5" />
                            選択
                          </button>
                          <input 
                            type="file" 
                            ref={fileInputRef} 
                            onChange={handleFileSelect} 
                            accept="image/jpeg, image/png, image/webp, application/pdf" 
                            className="hidden" 
                          />
                        </div>
                      </div>

                      {referenceImage && !isLimitReached && (
                        <div className="mt-3 flex items-center gap-3 p-2 bg-white/60 rounded-xl border border-slate-200 shadow-sm animate-in fade-in max-w-full">
                          <img src={referenceImage.dataUrl} alt="Reference" className="w-10 h-10 object-cover rounded-lg border border-slate-200 shrink-0" />
                          <div className="flex flex-col overflow-hidden">
                            <span className="text-xs font-bold text-violet-600 truncate">元画像セット完了！</span>
                            <span className="text-[10px] text-slate-500 font-medium truncate">この画像を元に修正します</span>
                          </div>
                          <button 
                            onClick={() => setReferenceImage(null)} 
                            className="ml-auto p-1 bg-slate-200 rounded-full hover:bg-slate-300 transition-colors shrink-0"
                          >
                            <X className="w-3.5 h-3.5 text-slate-600" />
                          </button>
                        </div>
                      )}
                    </div>

                    <div>
                      <Label>アートスタイル</Label>
                      <Select value={style} onChange={(e) => setStyle(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.style)} disabled={isLimitReached} />
                    </div>

                    <div>
                      <Label>画質レベル</Label>
                      <Select value={quality} onChange={(e) => setQuality(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.quality)} disabled={isLimitReached} />
                    </div>

                    <div>
                      <Label>ライティング</Label>
                      <Select value={lighting} onChange={(e) => setLighting(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.lighting)} disabled={isLimitReached} />
                    </div>

                    <div>
                      <Label>構図</Label>
                      <Select value={composition} onChange={(e) => setComposition(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.composition)} disabled={isLimitReached} />
                    </div>

                    <div>
                      <Label>画像サイズ</Label>
                      <Select value={size} onChange={(e) => setSize(e.target.value)} options={Object.keys(ASPECT_RATIO_MAPPINGS)} disabled={isLimitReached} />
                    </div>

                    <div className="mt-2 md:mt-4">
                      <button
                        onClick={handleGenerate}
                        disabled={isGenerating || isFileProcessing || isLimitReached}
                        className="clay-btn w-full py-3.5 sm:py-4 font-bold text-white flex items-center justify-center gap-2 text-base sm:text-lg disabled:opacity-70 disabled:cursor-not-allowed"
                      >
                        {isGenerating ? (
                          <>
                            <Loader2 className="w-5 h-5 sm:w-6 sm:h-6 animate-spin" />
                            生成しています...
                          </>
                        ) : (
                          <>
                            {isUnlocked ? <Sparkles className="w-5 h-5 text-yellow-300" /> : <Sparkles className="w-5 h-5" />}
                            {referenceImage ? '元画像から修正する' : '画像をみつける'}
                          </>
                        )}
                      </button>
                    </div>
                  </aside>

                  <section className="clay-panel flex-1 overflow-hidden flex flex-col relative min-h-[300px] lg:min-h-[500px] p-4 md:p-8">
                    
                    {!generatedImage && !error && (
                      <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                        {isGenerating ? (
                          <div className="flex flex-col items-center gap-4 sm:gap-5">
                            <div className="clay-btn p-3 sm:p-4 rounded-full bg-violet-100 flex items-center justify-center">
                              <Loader2 className="w-8 h-8 sm:w-10 sm:h-10 text-white animate-spin" />
                            </div>
                            <p className="text-lg sm:text-xl font-bold text-slate-600">AIが絵の具を混ぜています...</p>
                            <p className="text-xs sm:text-sm text-slate-500">完成まで少しだけお待ちください</p>
                          </div>
                        ) : (
                          <div className="flex flex-col items-center opacity-60">
                            <div className="w-20 h-20 sm:w-24 sm:h-24 mb-4 sm:mb-6 clay-image-box flex items-center justify-center text-slate-300 shrink-0">
                              <ImageIcon className="w-8 h-8 sm:w-10 sm:h-10" />
                            </div>
                            <h2 className="text-lg sm:text-2xl font-bold text-slate-600 mb-2">キャンバスは真っ白です</h2>
                            <p className="text-xs sm:text-sm text-slate-500 font-medium max-w-[250px] sm:max-w-none mx-auto">画像やPDFをドロップしてプロンプトを作ってみよう！</p>
                          </div>
                        )}
