<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>イメージみっけ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after {
      font-family: 'Noto Sans JP', sans-serif !important;
    }
    .clay-panel {
      background: #e8ecf2;
      border-radius: 32px;
      box-shadow:
        12px 12px 24px #cdd3de,
        -12px -12px 24px #ffffff,
        inset 2px 2px 4px rgba(255,255,255,0.8),
        inset -2px -2px 4px rgba(0,0,0,0.02);
    }
    .clay-input {
      background: #e8ecf2;
      border-radius: 16px;
      border: 2px solid transparent;
      box-shadow:
        inset 6px 6px 12px #cdd3de,
        inset -6px -6px 12px #ffffff;
      transition: all 0.2s ease;
      outline: none;
    }
    .clay-input:focus {
      border: 2px solid #a78bfa;
      box-shadow:
        inset 8px 8px 16px #cdd3de,
        inset -8px -8px 16px #ffffff;
    }
    .clay-btn {
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      border-radius: 20px;
      box-shadow:
        6px 6px 12px #cdd3de,
        -6px -6px 12px #ffffff,
        inset 4px 4px 8px rgba(255,255,255,0.4),
        inset -4px -4px 8px rgba(0,0,0,0.1);
      transition: all 0.15s ease;
    }
    .clay-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        8px 8px 16px #cdd3de,
        -8px -8px 16px #ffffff,
        inset 4px 4px 8px rgba(255,255,255,0.4),
        inset -4px -4px 8px rgba(0,0,0,0.1);
    }
    .clay-btn:active, .clay-btn:disabled {
      transform: translateY(2px);
      box-shadow:
        inset 6px 6px 12px rgba(0,0,0,0.15),
        inset -6px -6px 12px rgba(255,255,255,0.3);
    }
    .clay-btn-secondary {
      background: #e8ecf2;
      border-radius: 12px;
      box-shadow:
        4px 4px 8px #cdd3de,
        -4px -4px 8px #ffffff;
    }
    .clay-btn-secondary:active {
      box-shadow:
        inset 4px 4px 8px #cdd3de,
        inset -4px -4px 8px #ffffff;
    }
    .clay-image-box {
      background: #e8ecf2;
      border-radius: 24px;
      box-shadow:
        inset 8px 8px 16px #cdd3de,
        inset -8px -8px 16px #ffffff;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .gradient-text {
      background: linear-gradient(to right, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ★ ここにGemini APIキーを入力してください ★
    const API_KEY = "";

    const PROMPT_MAPPINGS = {
      style: {
        "写真風": "photorealistic, professional photography",
        "アニメ風": "anime style, vibrant colors",
        "油絵風": "oil painting, canvas texture",
        "水彩画風": "watercolor, soft edges",
        "デジタルアート": "digital art, highly detailed"
      },
      quality: {
        "標準": "good quality",
        "高品質": "high quality, detailed",
        "最高品質": "masterpiece, best quality, ultra-detailed, 8K"
      },
      lighting: {
        "自然光": "natural lighting",
        "スタジオライト": "studio lighting, professional",
        "ドラマチック": "dramatic lighting, high contrast",
        "柔らかい光": "soft lighting, diffused",
        "逆光": "backlit, rim lighting"
      },
      composition: {
        "クローズアップ": "close-up shot",
        "全体像": "full body shot, wide angle",
        "鳥瞰図": "aerial view, top-down",
        "低いアングル": "low angle shot"
      }
    };

    const ASPECT_RATIO_MAPPINGS = {
      "SNS投稿 (3:4)": "3:4",
      "SNSリール (9:16)": "9:16",
      "横長コンテンツ (16:9)": "16:9",
      "正方形 (1:1)": "1:1"
    };

    const fetchWithRetry = async (url, options, maxRetries = 5) => {
      let delay = 1000;
      for (let i = 0; i < maxRetries; i++) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error?.message || `HTTPエラー: ${response.status}`);
          }
          return response;
        } catch (error) {
          if (i === maxRetries - 1) {
            throw new Error("通信に失敗しました。時間をおいて再度お試しください。");
          }
          await new Promise(res => setTimeout(res, delay));
          delay *= 2;
        }
      }
    };

    // アイコンSVGコンポーネント（Lucide代替）
    const IconSparkles = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
      </svg>
    );

    const IconLoader = ({ size = 20 }) => (
      <svg className="spin" xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
      </svg>
    );

    const IconImage = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
        <circle cx="9" cy="9" r="2"/>
        <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
      </svg>
    );

    const IconAlertCircle = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{color:'#fb7185'}}>
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" x2="12" y1="8" y2="12"/>
        <line x1="12" x2="12.01" y1="16" y2="16"/>
      </svg>
    );

    const IconDownload = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" x2="12" y1="15" y2="3"/>
      </svg>
    );

    const IconCopy = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
        <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
      </svg>
    );

    const IconCheck = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );

    const SelectComp = ({ value, onChange, options }) => (
      <div style={{ position: 'relative' }}>
        <select
          value={value}
          onChange={onChange}
          className="clay-input w-full text-slate-700 font-medium py-3 px-4 text-sm cursor-pointer"
          style={{ appearance: 'none', WebkitAppearance: 'none' }}
        >
          {options.map(opt => (
            <option key={opt} value={opt}>{opt}</option>
          ))}
        </select>
        <div style={{ position: 'absolute', top: 0, right: 0, bottom: 0, display: 'flex', alignItems: 'center', paddingRight: '1rem', pointerEvents: 'none', color: '#94a3b8' }}>
          <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z" />
          </svg>
        </div>
      </div>
    );

    function App() {
      const [apiKey, setApiKey] = useState(API_KEY);
      const [showApiInput, setShowApiInput] = useState(!API_KEY);
      const [content, setContent] = useState('夕暮れの海辺で本を読む猫');
      const [style, setStyle] = useState('写真風');
      const [quality, setQuality] = useState('最高品質');
      const [lighting, setLighting] = useState('自然光');
      const [composition, setComposition] = useState('全体像');
      const [size, setSize] = useState('正方形 (1:1)');

      const [isGenerating, setIsGenerating] = useState(false);
      const [generatedImage, setGeneratedImage] = useState(null);
      const [finalPrompt, setFinalPrompt] = useState(null);
      const [error, setError] = useState(null);
      const [copySuccess, setCopySuccess] = useState(false);

      const handleGenerate = async () => {
        if (!content.trim()) {
          setError("画像の内容を入力してください。");
          return;
        }
        if (!apiKey.trim()) {
          setError("APIキーを入力してください。");
          return;
        }

        setIsGenerating(true);
        setError(null);
        setGeneratedImage(null);
        setFinalPrompt(null);
        setCopySuccess(false);

        try {
          // Step 1: 日本語を英語に翻訳
          const translationInstruction = `Translate the following Japanese text to English. Output ONLY the English translation, without any quotes or explanations.\nJapanese: ${content}`;

          const textResponse = await fetchWithRetry(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: translationInstruction }] }] })
            }
          );

          const textData = await textResponse.json();
          let translatedContent = textData.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
          translatedContent = translatedContent.replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();

          if (!translatedContent) throw new Error("翻訳に失敗しました。");

          // Step 2: プロンプト構築
          const englishPrompt = [
            translatedContent,
            PROMPT_MAPPINGS.style[style],
            PROMPT_MAPPINGS.quality[quality],
            PROMPT_MAPPINGS.lighting[lighting],
            PROMPT_MAPPINGS.composition[composition]
          ].filter(Boolean).join(", ");

          setFinalPrompt(englishPrompt);

          // Step 3: 画像生成
          const finalImagePrompt = `${englishPrompt}. Aspect ratio: ${ASPECT_RATIO_MAPPINGS[size]}.`;

          const imageResponse = await fetchWithRetry(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-preview-image-generation:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: finalImagePrompt }] }],
                generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
              })
            }
          );

          const imageData = await imageResponse.json();

          if (imageData.candidates?.[0]?.finishReason && imageData.candidates[0].finishReason !== 'STOP') {
            throw new Error(`画像生成がブロックされました (理由: ${imageData.candidates[0].finishReason})。別の内容をお試しください。`);
          }

          const base64Image = imageData.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;

          if (base64Image) {
            setGeneratedImage(`data:image/png;base64,${base64Image}`);
          } else {
            throw new Error("画像データが取得できませんでした。モデルがまだ画像生成に対応していない可能性があります。");
          }

        } catch (err) {
          setError(err.message || "エラーが発生しました。");
        } finally {
          setIsGenerating(false);
        }
      };

      const handleCopyPrompt = () => {
        if (!finalPrompt) return;
        navigator.clipboard.writeText(finalPrompt).then(() => {
          setCopySuccess(true);
          setTimeout(() => setCopySuccess(false), 2000);
        }).catch(() => {
          const ta = document.createElement("textarea");
          ta.value = finalPrompt;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          setCopySuccess(true);
          setTimeout(() => setCopySuccess(false), 2000);
        });
      };

      const handleDownload = () => {
        if (!generatedImage) return;
        const link = document.createElement('a');
        link.href = generatedImage;
        link.download = `mikke-image-${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const Label = ({ children }) => (
        <label className="block text-sm font-bold text-slate-500 mb-2 ml-1">{children}</label>
      );

      return (
        <div className="min-h-screen p-4 flex flex-col" style={{ background: '#e8ecf2', color: '#334155' }}>

          {/* APIキー設定バー */}
          {showApiInput && (
            <div className="clay-panel p-4 mb-6 max-w-7xl mx-auto w-full">
              <p className="text-sm font-bold text-slate-500 mb-2">🔑 Gemini APIキーを入力してください</p>
              <div className="flex gap-3">
                <input
                  type="password"
                  value={apiKey}
                  onChange={e => setApiKey(e.target.value)}
                  className="clay-input flex-1 py-2 px-4 text-sm text-slate-700"
                  placeholder="AIzaSy..."
                />
                <button
                  onClick={() => setShowApiInput(false)}
                  className="clay-btn px-5 py-2 text-white text-sm font-bold"
                >設定する</button>
              </div>
            </div>
          )}

          {/* ヘッダー */}
          <header className="mb-8 text-center pt-2">
            <h1 className="text-4xl font-extrabold inline-flex items-center gap-3" style={{ filter: 'drop-shadow(0 1px 2px rgba(0,0,0,0.1))' }}>
              <span style={{ color: '#8b5cf6' }}>✦</span>
              <span className="gradient-text">イメージみっけ</span>
            </h1>
            <p className="text-slate-500 mt-3 font-bold text-sm tracking-wide">プロンプト不要で、とっておきの1枚を作ろう</p>
            {!showApiInput && (
              <button onClick={() => setShowApiInput(true)} className="mt-2 text-xs text-slate-400 underline">APIキーを変更する</button>
            )}
          </header>

          {/* メインコンテンツ */}
          <main className="flex flex-col gap-6 flex-1 max-w-7xl w-full mx-auto" style={{ flexDirection: 'column' }}>

            <div className="flex flex-col gap-6" style={{ display: 'flex', flexWrap: 'wrap' }}>

              {/* 左パネル：設定 */}
              <div className="clay-panel p-6 flex flex-col gap-5" style={{ minWidth: '280px', flex: '0 0 auto', width: '100%', maxWidth: '420px', alignSelf: 'start' }}>

                <div>
                  <Label>なにを描きたい？（画像の内容）</Label>
                  <textarea
                    value={content}
                    onChange={e => setContent(e.target.value)}
                    className="clay-input w-full text-slate-700 py-3 px-4 text-sm"
                    style={{ resize: 'none', height: '7rem' }}
                    placeholder="生成したい画像の説明を入力..."
                  />
                </div>

                <div>
                  <Label>アートスタイル</Label>
                  <SelectComp value={style} onChange={e => setStyle(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.style)} />
                </div>

                <div>
                  <Label>画質レベル</Label>
                  <SelectComp value={quality} onChange={e => setQuality(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.quality)} />
                </div>

                <div>
                  <Label>ライティング</Label>
                  <SelectComp value={lighting} onChange={e => setLighting(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.lighting)} />
                </div>

                <div>
                  <Label>構図</Label>
                  <SelectComp value={composition} onChange={e => setComposition(e.target.value)} options={Object.keys(PROMPT_MAPPINGS.composition)} />
                </div>

                <div>
                  <Label>画像サイズ</Label>
                  <SelectComp value={size} onChange={e => setSize(e.target.value)} options={Object.keys(ASPECT_RATIO_MAPPINGS)} />
                </div>

                <div className="mt-2">
                  <button
                    onClick={handleGenerate}
                    disabled={isGenerating}
                    className="clay-btn w-full py-4 font-bold text-white flex items-center justify-center gap-2 text-lg"
                    style={{ cursor: isGenerating ? 'not-allowed' : 'pointer' }}
                  >
                    {isGenerating ? (
                      <>
                        <IconLoader size={24} />
                        <span>生成しています...</span>
                      </>
                    ) : (
                      <>
                        <IconSparkles />
                        <span>画像をみつける</span>
                      </>
                    )}
                  </button>
                </div>
              </div>

              {/* 右パネル：プレビュー */}
              <div className="clay-panel flex-1 flex flex-col" style={{ minHeight: '480px', padding: '2rem', position: 'relative', flex: '1 1 300px' }}>

                {/* デフォルト・ローディング */}
                {!generatedImage && !error && (
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '1.5rem', textAlign: 'center', color: '#94a3b8' }}>
                    {isGenerating ? (
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1.25rem' }}>
                        <div className="clay-btn" style={{ padding: '1rem', borderRadius: '9999px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                          <IconLoader size={40} />
                        </div>
                        <p style={{ fontSize: '1.25rem', fontWeight: 700, color: '#475569' }}>AIが絵の具を混ぜています...</p>
                        <p style={{ fontSize: '0.875rem', color: '#64748b' }}>完成まで少しだけお待ちください</p>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', opacity: 0.6 }}>
                        <div className="clay-image-box" style={{ width: '6rem', height: '6rem', marginBottom: '1.5rem', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#cbd5e1' }}>
                          <IconImage />
                        </div>
                        <h2 style={{ fontSize: '1.5rem', fontWeight: 700, color: '#475569', marginBottom: '0.5rem' }}>キャンバスは真っ白です</h2>
                        <p style={{ color: '#64748b', fontWeight: 500 }}>左の設定を選んで、「みつける」ボタンを押してね！</p>
                      </div>
                    )}
                  </div>
                )}

                {/* エラー */}
                {error && (
                  <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '1.5rem', textAlign: 'center' }}>
                    <div className="clay-image-box" style={{ padding: '1.5rem', display: 'flex', flexDirection: 'column', alignItems: 'center', maxWidth: '28rem' }}>
                      <IconAlertCircle />
                      <h2 style={{ fontSize: '1.25rem', fontWeight: 700, color: '#f43f5e', margin: '1rem 0 0.5rem' }}>ちょっと問題がおきました</h2>
                      <p style={{ fontSize: '0.875rem', color: '#475569', marginBottom: '1.5rem' }}>{error}</p>
                      <button
                        onClick={() => setError(null)}
                        className="clay-btn-secondary"
                        style={{ padding: '0.5rem 1.5rem', color: '#475569', fontWeight: 700, cursor: 'pointer' }}
                      >やり直す</button>
                    </div>
                  </div>
                )}

                {/* 成功 */}
                {generatedImage && !isGenerating && (
                  <div className="custom-scrollbar" style={{ display: 'flex', flexDirection: 'column', height: '100%', overflowY: 'auto' }}>

                    {/* 画像 */}
                    <div className="clay-image-box" style={{ position: 'relative', flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '2rem', padding: '1rem', minHeight: '300px' }}>
                      <img
                        src={generatedImage}
                        alt="Generated AI Art"
                        style={{ maxWidth: '100%', maxHeight: '60vh', objectFit: 'contain', borderRadius: '0.75rem' }}
                      />
                      <button
                        onClick={handleDownload}
                        className="clay-btn"
                        style={{ position: 'absolute', bottom: '1.5rem', right: '1.5rem', padding: '0.75rem 1rem', display: 'flex', alignItems: 'center', gap: '0.5rem', color: 'white', cursor: 'pointer' }}
                        title="画像を保存"
                      >
                        <IconDownload />
                        <span style={{ fontWeight: 700, fontSize: '0.875rem' }}>保存する</span>
                      </button>
                    </div>

                    {/* プロンプト表示 */}
                    <div className="clay-image-box" style={{ padding: '1.25rem' }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1rem' }}>
                        <h3 style={{ fontSize: '0.875rem', fontWeight: 700, color: '#64748b', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                          <span style={{ color: '#a78bfa' }}>✦</span>
                          AIにお願いした魔法の言葉（プロンプト）
                        </h3>
                        <button
                          onClick={handleCopyPrompt}
                          className="clay-btn-secondary"
                          style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', padding: '0.375rem 0.75rem', fontSize: '0.75rem', fontWeight: 700, color: '#475569', cursor: 'pointer' }}
                        >
                          {copySuccess ? (
                            <><IconCheck /><span>コピー完了！</span></>
                          ) : (
                            <><IconCopy /><span>コピーする</span></>
                          )}
                        </button>
                      </div>
                      <div style={{ background: 'rgba(255,255,255,0.5)', padding: '1rem', borderRadius: '1rem', color: '#475569', fontSize: '0.875rem', fontFamily: 'monospace', lineHeight: '1.6', wordBreak: 'break-all', boxShadow: 'inset 2px 2px 8px rgba(0,0,0,0.05)' }}>
                        {finalPrompt}
                      </div>
                    </div>

                  </div>
                )}

              </div>
            </div>

          </main>

          <footer style={{ textAlign: 'center', marginTop: '2rem', color: '#94a3b8', fontSize: '0.75rem' }}>
            イメージみっけ &copy; Smile Plus Consulting
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
